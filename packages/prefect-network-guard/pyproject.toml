[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prefect-network-guard"
version = "1.0.0"
description = "Outbound request whitelist proxy for Prefect — blocks all external network requests not on an explicit allowlist."
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["prefect", "network", "security", "compliance", "whitelist"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[project.optional-dependencies]
httpx = ["httpx"]

[tool.hatch.build.targets.wheel]
# No packages to auto-discover — we install a single .py module at site-packages root
packages = []

# Place the module and .pth file directly at the wheel root (= site-packages on install)
[tool.hatch.build.targets.wheel.force-include]
"./prefect_network_guard.py" = "prefect_network_guard.py"
"./prefect_network_guard.pth" = "prefect_network_guard.pth"
